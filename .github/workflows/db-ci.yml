name: Database CI

permissions:
  contents: read
  pull-requests: write

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
    paths:
      - "supabase/migrations/**"
      - "supabase/seed.sql"
      - "supabase/config.toml"
      - ".github/workflows/db-ci.yml"
      - ".github/workflows/db-production.yml"
      - "scripts/supabase/**"
      - "package.json"
      - "bun.lock"
  push:
    branches:
      - main
    paths:
      - "supabase/migrations/**"
      - "supabase/seed.sql"
      - "supabase/config.toml"
      - ".github/workflows/db-ci.yml"
      - ".github/workflows/db-production.yml"
      - "scripts/supabase/**"
      - "package.json"
      - "bun.lock"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: test-openai-key
      SUPABASE_AUTH_SMS_TWILIO_AUTH_TOKEN: test-twilio-token
      GOOGLE_CLIENT_ID: test-google-client-id
      GOOGLE_CLIENT_SECRET: test-google-client-secret
      SUPABASE_AUTH_EXTERNAL_APPLE_SECRET: test-apple-secret
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: 2.92.1

      - run: supabase start
      - run: supabase db lint
      - name: Reset local Supabase with retry
        run: |
          for attempt in 1 2 3; do
            if supabase db reset; then
              exit 0
            fi

            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi

            echo "supabase db reset failed, retrying..."
            sleep 10
          done
